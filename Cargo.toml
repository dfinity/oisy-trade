[workspace]
resolver = "2"
members = [
    "canister", "integration_tests",
    "libs/client",
    "libs/types",
    "libs/types-internal",
]

[workspace.package]
authors = ["DFINITY Stiftung"]
edition = "2024"
repository = "https://github.com/dfinity/dex"
homepage = "https://github.com/dfinity/dex#readme"
license = "Apache-2.0"
readme = "README.md"

[profile.release]
debug = false
lto = true
strip = true
opt-level = 's'

# Required by `ic-test-utilities-load-wasm`
[profile.canister-release]
inherits = "release"

[workspace.dependencies]
async-trait = "0.1.89"
mockall = "0.14.0"
candid = "0.10.26"
candid_parser = "0.3.0"
canlog = "0.2.0"
ic-cdk = "0.20.0"
ic-cdk-timers = "1.0.0"
ic-http-types = "0.1.0"
ic-test-utilities-load-wasm = { git = "https://github.com/dfinity/ic", tag = "release-2026-01-29_23-28-base" }
icrc-ledger-types = "0.1.13"
pocket-ic = "13.0.0"
proptest = "1"
serde = "1.0.228"
serde_json = "1"
tokio = "1.50.0"
