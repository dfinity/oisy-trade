name: 'DEX'

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "README.md"
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
      - name: 'Install just'
        uses: extractions/setup-just@v2
      - name: 'Check code'
        run: just lint

  reproducible-build:
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
#        TODO DEFI-2722: setup reproducible build with Docker
      - name: 'Install just'
        uses: extractions/setup-just@v2
      - name: Docker build
        run: just build

      - name: 'Archive Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: dex_canister.wasm.gz
          path: ./wasms/dex_canister.wasm.gz
          if-no-files-found: error

      - name: 'Add summary'
        run: |
          hash=`sha256sum ./wasms/dex_canister.wasm.gz`
          echo "SHA-256 :hash: ${hash}" >> $GITHUB_STEP_SUMMARY

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
      - name: 'Install just'
        uses: extractions/setup-just@v2
      - name: 'Run unit tests'
        run: just unit-tests

  integration-tests:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Install just'
        uses: extractions/setup-just@v2

      - name: 'Download Artifacts'
        uses: actions/download-artifact@v4
        with:
          name: dex_canister.wasm.gz

      - name: 'Set DEX_CANISTER_WASM_PATH for load_wasm'
        run: |
          echo "DEX_CANISTER_WASM_PATH=$GITHUB_WORKSPACE/dex_canister.wasm.gz" >> "$GITHUB_ENV"

      - name: 'Install PocketIC server'
        uses: dfinity/pocketic@main
        with:
          pocket-ic-server-version: "13.0.0"

      - name: Cargo test
        run: just integration-tests

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Checkout baseline branch'
        uses: actions/checkout@v4
        with:
          ref: main
          path: _canbench_baseline_branch

      - name: 'Install Rust wasm32 target'
        run: rustup target add wasm32-unknown-unknown

      - name: 'Benchmark'
        run: bash ./scripts/ci_run_benchmark.sh canister ${{ github.job }}

      - uses: actions/upload-artifact@v4
        with:
          name: canbench_result_${{ github.job }}
          path: /tmp/canbench_result_${{ github.job }}.md

      - uses: actions/upload-artifact@v4
        with:
          name: canbench_results_${{ github.job }}_csv
          path: /tmp/canbench_results_${{ github.job }}.csv

      - name: 'Pass or fail'
        run: bash ./scripts/ci_post_run_benchmark.sh

  upload-pr-number:
    runs-on: ubuntu-latest
    steps:
      - name: 'Save PR number'
        run: |
          mkdir -p ./pr_number
          echo ${{ github.event.pull_request.number }} > ./pr_number/pr_number

      - uses: actions/upload-artifact@v4
        with:
          name: pr_number
          path: pr_number/
