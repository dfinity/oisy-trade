# Service endpoints excluded from the candid backward-compatibility check
# (the `candid-backward-compat` CI job). These endpoints ship with NO
# backwards-compatibility guarantee, so changes to them or to the types
# reachable only through them must not gate a PR.
#
# List one method name per line. Blank lines and lines starting with `#`
# are ignored.
#
# The CI job strips each listed method declaration from both the base and
# head `.did` before running `didc check`. Stripping a method makes its
# exclusive transitive types (those reachable only through that method)
# unreferenced, and `didc check` ignores unreferenced types — so e.g.
# adding a new event variant to `EventType` (reachable only via
# `get_events`) no longer flags as a breaking change.
#
# Only list endpoints whose entire type subgraph carries no compat
# guarantee. If a type is shared with a stable endpoint, do NOT list the
# method here — split the shared type first.
get_events
