name: 'OISY TRADE'

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  merge_group:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "README.md"
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  conventional-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TITLE: ${{ github.event.pull_request.title }}
    steps:
      - run: |
          if [[ "$TITLE" =~ ^(feat|fix|chore|build|ci|docs|style|refactor|perf|test)(\([-a-zA-Z0-9_,]+\))?\!?\: ]]; then
              echo pass
          else
              echo "PR title does not match conventions"
              exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false
      - name: 'Check code'
        run: just lint

  reproducible-build:
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false
      - name: Docker build
        run: just docker-build

      - name: 'Archive Artifact'
        # `archive: false` uploads the file as-is, without zip-wrapping. The
        # artifact name is taken from the file name (the `name:` input is
        # ignored in this mode). Downloaders get exactly the bytes whose
        # SHA-256 is shown in the job summary below.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./wasms/oisy_trade_canister.wasm.gz
          if-no-files-found: error
          archive: false

      - name: 'Add summary'
        run: |
          hash=`sha256sum ./wasms/oisy_trade_canister.wasm.gz`
          echo "SHA-256 :hash: ${hash}" >> $GITHUB_STEP_SUMMARY

  # Independently rebuild the canister on a different runner image and assert
  # the SHA-256 matches the artifact produced by `reproducible-build`. This
  # gates any non-determinism leaking in from the runner environment, the
  # Docker daemon version, or accidental host-state dependencies in the build.
  reproducibility-verify:
    needs: [reproducible-build]
    runs-on: ubuntu-24.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false

      - name: 'Independent Docker build'
        run: just docker-build

      - name: 'Download canonical artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oisy_trade_canister.wasm.gz
          path: ./canonical

      - name: 'Compare hashes'
        run: |
          canonical_hash=$(sha256sum ./canonical/oisy_trade_canister.wasm.gz | awk '{print $1}')
          local_hash=$(sha256sum ./wasms/oisy_trade_canister.wasm.gz | awk '{print $1}')
          echo "Canonical: $canonical_hash"
          echo "Local:     $local_hash"
          if [[ "$canonical_hash" != "$local_hash" ]]; then
            echo "::error::Reproducibility check failed — hashes differ between runners"
            echo "SHA-256 mismatch :x:" >> $GITHUB_STEP_SUMMARY
            echo "- canonical (\`reproducible-build\` on ubuntu-22.04): \`$canonical_hash\`" >> $GITHUB_STEP_SUMMARY
            echo "- this job (ubuntu-24.04): \`$local_hash\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "SHA-256 reproducibility OK :white_check_mark: \`$local_hash\`" >> $GITHUB_STEP_SUMMARY

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false
      - name: 'Run unit tests'
        run: just unit-tests

  integration-tests:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false

      - name: 'Download Artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oisy_trade_canister.wasm.gz

      - name: 'Set OISY_TRADE_CANISTER_WASM_PATH for load_wasm'
        run: |
          echo "OISY_TRADE_CANISTER_WASM_PATH=$GITHUB_WORKSPACE/oisy_trade_canister.wasm.gz" >> "$GITHUB_ENV"

      - name: 'Install PocketIC server'
        uses: dfinity/pocketic@20c33db1aa87cc6ece50857ac632c37acf5e0322 # main
        with:
          pocket-ic-server-version: "13.0.0"

      - name: Cargo test
        run: just integration-tests

  check-canister-wasm-endpoints:
    needs: reproducible-build
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Download WASM'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oisy_trade_canister.wasm.gz

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false

      - name: 'Check canister endpoints'
        run: |
          ic-wasm "$GITHUB_WORKSPACE/oisy_trade_canister.wasm.gz" check-endpoints \
            --hidden ./canister/hidden_endpoints.conf \
            --candid ./canister/oisy_trade.did

  candid-backward-compat:
    runs-on: ubuntu-latest
    steps:
      - name: 'Check for candid-breaking-change override'
        id: check-override
        if: github.event_name == 'pull_request'
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          has_label=$(echo "$LABELS" | jq 'map(select(. == "candid-breaking-change")) | length > 0')
          if [[ "$has_label" == "true" ]] && \
             [[ "$TITLE" =~ ^(feat|fix|chore|build|ci|docs|style|refactor|perf|test)(\([-a-zA-Z0-9_,]+\))?!: ]]; then
            echo "Override active: candid-breaking-change label with breaking-commit title."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Install didc'
        run: |
          curl -fsSL https://github.com/dfinity/candid/releases/download/2025-12-18/didc-linux64 \
            -o /usr/local/bin/didc
          echo "32693c76d9c6fe0f273f2c1ebf7e48ba3c383e925e5afd17dd264a06aed9fbcc  /usr/local/bin/didc" | sha256sum --check
          chmod +x /usr/local/bin/didc

      - name: 'Download released Candid interface'
        id: download-released
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --limit 20 --json tagName \
            --jq '[.[] | select(.tagName | startswith("oisy_trade_canister-v"))] | first | .tagName')
          if [ -z "$tag" ]; then
            echo "No canister release found; skipping backward-compat check."
          else
            echo "Checking backward compatibility against $tag"
            gh release download "$tag" --pattern 'oisy_trade.did' --output released_oisy_trade.did
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Check Candid backward compatibility'
        if: steps.download-released.outputs.tag != ''
        continue-on-error: ${{ steps.check-override.outputs.skip == 'true' }}
        run: didc check canister/oisy_trade.did released_oisy_trade.did

  benchmark:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Checkout baseline branch'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: _canbench_baseline_branch

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Disable cache to avoid issues with wasm32 target
          # See https://github.com/jdx/mise-action/issues/215
          cache: false

      - name: 'Benchmark'
        run: bash ./scripts/ci_run_benchmark.sh canister ${{ github.job }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: canbench_result_${{ github.job }}
          path: /tmp/canbench_result_${{ github.job }}.md

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: canbench_results_${{ github.job }}_csv
          path: /tmp/canbench_results_${{ github.job }}.csv

      - name: 'Pass or fail'
        run: bash ./scripts/ci_post_run_benchmark.sh

  upload-pr-number:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 'Save PR number'
        run: |
          mkdir -p ./pr_number
          echo ${{ github.event.pull_request.number }} > ./pr_number/pr_number

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr_number
          path: pr_number/

  # Gate job: the single required status check for the merge queue.
  # Adding or removing CI jobs only requires updating the `needs` list below,
  # with no change to the repo's branch protection settings.
  # Note: upload-pr-number is intentionally excluded — it's an artifact helper, not a quality check.
  ci-pass:
    if: always()
    needs:
      - lint
      - reproducible-build
      - reproducibility-verify
      - unit-tests
      - integration-tests
      - check-canister-wasm-endpoints
      - candid-backward-compat
      - benchmark
      - conventional-pr-title
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
