[book]
title = "OISY TRADE"
description = "Documentation for OISY TRADE — an order-book DEX on the Internet Computer."
authors = ["DFINITY"]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/dfinity/oisy-trade"
edit-url-template = "https://github.com/dfinity/oisy-trade/edit/main/docs/{path}"
no-section-label = true

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
