[workspace]
resolver = "2"
members = [
    "canister", "integration_tests",
    "libs/client",
    "libs/types",
]

[workspace.package]
authors = ["DFINITY Stiftung"]
edition = "2024"
repository = "https://github.com/dfinity/dex"
homepage = "https://github.com/dfinity/dex#readme"
license = "Apache-2.0"
readme = "README.md"

[profile.release]
debug = false
lto = true
strip = true
opt-level = 's'

[workspace.dependencies]
async-trait = "0.1.89"
mockall = "0.14.0"
candid = "0.10.26"
candid_parser = "0.3.0"
ic-cdk = "0.20.0"
ic-cdk-timers = "1.0.0"
icrc-ledger-types = "0.1.13"
pocket-ic = "13.0.0"
proptest = "1"
serde = "1.0.228"
tokio = "1.50.0"
