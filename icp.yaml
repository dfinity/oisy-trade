canisters:
  - name: dex
    recipe:
      type: "@dfinity/rust@0.4.0"
      configuration:
        package: dex_canister
        candid: canister/dex.did
        shrink: true
        compress: true

environments:
  - name: staging
    network: ic
    canisters: [dex]

  - name: prod
    network: ic
    canisters: [dex]