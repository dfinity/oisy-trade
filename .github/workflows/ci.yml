name: 'DEX'

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "README.md"
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  conventional-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TITLE: ${{ github.event.pull_request.title }}
    steps:
      - run: |
          if [[ "$TITLE" =~ ^(feat|fix|chore|build|ci|docs|style|refactor|perf|test)(\([-a-zA-Z0-9,]+\))?\!?\: ]]; then
              echo pass
          else
              echo "PR title does not match conventions"
              exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: 'Install just'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - name: 'Install cargo-sort'
        run: cargo install cargo-sort
      - name: 'Check code'
        run: just lint

  reproducible-build:
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
#        TODO DEFI-2722: setup reproducible build with Docker
      - name: 'Install just'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - name: Docker build
        run: just build

      - name: 'Archive Artifact'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dex_canister.wasm.gz
          path: ./wasms/dex_canister.wasm.gz
          if-no-files-found: error

      - name: 'Add summary'
        run: |
          hash=`sha256sum ./wasms/dex_canister.wasm.gz`
          echo "SHA-256 :hash: ${hash}" >> $GITHUB_STEP_SUMMARY

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: 'Install just'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - name: 'Run unit tests'
        run: just unit-tests

  integration-tests:
    needs: [ reproducible-build ]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Install just'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: 'Download Artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dex_canister.wasm.gz

      - name: 'Set DEX_CANISTER_WASM_PATH for load_wasm'
        run: |
          echo "DEX_CANISTER_WASM_PATH=$GITHUB_WORKSPACE/dex_canister.wasm.gz" >> "$GITHUB_ENV"

      - name: 'Install PocketIC server'
        uses: dfinity/pocketic@20c33db1aa87cc6ece50857ac632c37acf5e0322 # main
        with:
          pocket-ic-server-version: "13.0.0"

      - name: Cargo test
        run: just integration-tests

  benchmark:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 'Checkout baseline branch'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          path: _canbench_baseline_branch

      - name: 'Install Rust wasm32 target'
        run: rustup target add wasm32-unknown-unknown

      - name: 'Benchmark'
        run: bash ./scripts/ci_run_benchmark.sh canister ${{ github.job }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: canbench_result_${{ github.job }}
          path: /tmp/canbench_result_${{ github.job }}.md

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: canbench_results_${{ github.job }}_csv
          path: /tmp/canbench_results_${{ github.job }}.csv

      - name: 'Pass or fail'
        run: bash ./scripts/ci_post_run_benchmark.sh

  upload-pr-number:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 'Save PR number'
        run: |
          mkdir -p ./pr_number
          echo ${{ github.event.pull_request.number }} > ./pr_number/pr_number

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr_number
          path: pr_number/

  # Gate job: the single required status check for the merge queue.
  # Adding or removing CI jobs only requires updating the `needs` list below,
  # with no change to the repo's branch protection settings.
  ci-pass:
    if: always()
    needs:
      - lint
      - reproducible-build
      - unit-tests
      - integration-tests
      - benchmark
      - conventional-pr-title
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
