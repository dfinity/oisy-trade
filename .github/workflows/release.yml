name: Release

on:
  workflow_dispatch:

jobs:
  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: 'Run release-plz'
        uses: release-plz/action@bbd1afc9813d25602e002b29e96e0aacebab1160 # v0.5.105
        with:
          command: release-pr
          # Pin the release-plz binary. >= 0.3.142 creates the PR branch via the
          # GitHub API (authenticated with the token) instead of `git push`,
          # which otherwise fails with "could not read Username". >= 0.3.151
          # adds the `git_only` config the canister package relies on, with the
          # git-only-with-path-dependency fixes landing through 0.3.157.
          version: 0.3.159
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
